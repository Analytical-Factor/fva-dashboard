<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | Demand Planning Audit Center</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-card {
      width: min(100%, 390px);
      padding: 32px;
    }
    .login-brand { margin-bottom: 28px; }
    .login-brand .brand { min-width: 0; }
    .login-card h1 { margin-bottom: 8px; font-size: 28px; }
    .login-copy { margin-bottom: 24px; color: var(--muted); line-height: 1.5; }
    .login-form { display: grid; gap: 17px; }
    .field { display: grid; gap: 7px; }
    .field label { font-size: 12px; font-weight: 800; }
    .field input {
      width: 100%;
      border: 1px solid #cdd9de;
      border-radius: 9px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
    }
    .field input:focus {
      outline: 3px solid rgba(11, 127, 130, 0.15);
      border-color: var(--teal);
    }
    .login-form .button { width: 100%; padding: 11px 14px; }
    .login-error {
      margin: -4px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--red);
      background: var(--red-soft);
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="login-card card" aria-labelledby="loginTitle">
    <div class="login-brand">
      <div class="brand"><div class="brand-mark">AF</div><div class="brand-name">Demand Planning</div></div>
    </div>
    <h1 id="loginTitle">Audit Center sign in</h1>
    <p class="login-copy">Enter your dashboard credentials to continue.</p>
    <form class="login-form" id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <p class="login-error" id="loginError" role="alert" hidden>Invalid username or password.</p>
      <button class="button primary" type="submit">Sign in</button>
    </form>
  </main>

  <script>
    const AUTH_KEY = "afAuditDashboardAuthenticated";
    const USERNAME = "EMRuser";
    const PASSWORD = "EMRdashboard#2026!";

    if (sessionStorage.getItem(AUTH_KEY) === "true") {
      window.location.replace("index.html");
    }

    document.getElementById("loginForm").addEventListener("submit", event => {
      event.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const isValid = username === USERNAME && password === PASSWORD;

      document.getElementById("loginError").hidden = isValid;
      if (!isValid) {
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
        return;
      }

      sessionStorage.setItem(AUTH_KEY, "true");
      window.location.replace("index.html");
    });
  </script>
</body>
</html>
